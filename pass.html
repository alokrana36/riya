<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Riyu 💖</title>

  <style>
    :root {
      --pink: #ff4f9a;
      --pink2: #ff85c1;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffe4f2, #fff);
      overflow: hidden;
    }

    /* 💖 floating hearts */
    .heart {
      position: fixed;
      width: 20px;
      height: 20px;
      background: var(--pink);
      transform: rotate(45deg);
      animation: float 6s linear infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: var(--pink);
      border-radius: 50%;
    }

    .heart::before {
      top: -10px;
    }

    .heart::after {
      left: -10px;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(45deg);
        opacity: 0
      }

      20% {
        opacity: 1
      }

      100% {
        transform: translateY(-10vh) rotate(45deg);
        opacity: 0
      }
    }

    /* LOGIN */
    .wrap {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(255, 79, 154, 0.3);
      animation: fadeIn .8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(.9)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    h2 {
      color: var(--pink);
    }

    input {
      padding: 12px;
      width: 220px;
      border-radius: 12px;
      border: 2px solid #ffd6ec;
      outline: none;
    }

    input:focus {
      border-color: var(--pink);
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--pink), var(--pink2));
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .error {
      color: red;
      display: none;
      margin-top: 8px;
    }

    /* CONTENT */
    #content {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #fff, #ffe4f2);
    }

    /* iframe frame */
    .frame {
      position: absolute;
      inset: 20px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: zoomIn 1s ease;
    }

    @keyframes zoomIn {
      from {
        transform: scale(.9);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <!-- hearts -->
  <script>
    for (let i = 0; i < 20; i++) {
      let h = document.createElement("div");
      h.className = "heart";
      h.style.left = Math.random() * 100 + "%";
      h.style.animationDelay = Math.random() * 5 + "s";
      document.body.appendChild(h);
    }
  </script>

  <!-- LOGIN -->
  <div class="wrap" id="loginView">
    <div class="card">
      <h2>Hey Riyu 💖</h2>
      <p>Only you can unlock this 😉</p>

      <form id="form">
        <input type="password" id="password" placeholder="Enter secret..." required>
        <br>
        <button>Unlock 💌</button>
        <div class="error" id="error">Wrong password 😢</div>
      </form>
    </div>
  </div>

  <!-- AFTER LOGIN -->
  <div id="content">
    <div class="frame">
      <iframe src="afterpass.html"></iframe>
    </div>
  </div>

  <!-- 🎵 MUSIC -->
  <audio id="music" loop>
    <source src="tumhi.mp3" type="audio/mpeg">
    <!-- <source src="/Users/alokrana36/Desktop/riyu/Tum Hi Ho Aashiqui 2 128 Kbps.mp3" type="audio/mpeg"> -->
  </audio>

  <script>
    const PASS = "riyu";

    const form = document.getElementById("form");
    const input = document.getElementById("password");
    const error = document.getElementById("error");
    const login = document.getElementById("loginView");
    const content = document.getElementById("content");
    const music = document.getElementById("music");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      if (input.value.toLowerCase() === PASS) {
        login.style.display = "none";
        content.style.display = "block";

        // 🎵 Smooth music start
        startMusicSmooth();
      } else {
        error.style.display = "block";
      }
    });

    function startMusicSmooth() {
      music.volume = 0; // start from 0
      music.play().then(() => {

        let vol = 0;
        const fade = setInterval(() => {
          if (vol < 1) {
            vol += 0.05;   // speed of fade (increase for faster)
            music.volume = vol;
          } else {
            clearInterval(fade);
          }
        }, 200); // time gap (lower = faster fade)

      }).catch(() => { });
    }
  </script>
</body>

</html>
