<!DOCTYPE html>
<html>

<head>
    <title>💖 Private Chat</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

    <h2>💖 Chat App</h2>

    <!-- LOGIN -->
    <div id="login">
        <input id="email" placeholder="Email"><br><br>
        <input id="password" type="password" placeholder="Password"><br><br>
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- CHAT -->
    <div id="chat" style="display:none;">
        <div id="messages" style="height:200px; overflow:auto; border:1px solid black;"></div><br>
        <input id="msg" placeholder="Type message">
        <button onclick="send()">Send</button>
        <button onclick="logout()">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzfAWJ9J-bkSo47YBVMZAQcnR15UMAGU8",
            authDomain: "chat-app-f1510.firebaseapp.com",
            projectId: "chat-app-f1510",
            storageBucket: "chat-app-f1510.firebasestorage.app",
            messagingSenderId: "975456555470",
            appId: "1:975456555470:web:5ad3b1f78fd35a1d0ddb9f",
            measurementId: "G-MNG1R2YYH1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();

        window.signup = () => {
            createUserWithEmailAndPassword(auth, email.value, password.value);
        };

        window.login = () => {
            signInWithEmailAndPassword(auth, email.value, password.value)
                .then(() => {
                    login.style.display = "none";
                    chat.style.display = "block";
                    loadMessages();
                });
        };

        window.logout = () => {
            signOut(auth);
            location.reload();
        };

        window.send = async () => {
            await addDoc(collection(db, "messages"), {
                text: msg.value,
                time: Date.now()
            });
            msg.value = "";
        };

        function loadMessages() {
            const q = query(collection(db, "messages"), orderBy("time"));
            onSnapshot(q, (snapshot) => {
                messages.innerHTML = "";
                snapshot.forEach(doc => {
                    messages.innerHTML += "<p>" + doc.data().text + "</p>";
                });
            });
        }
    </script>

</body>

</html>
